<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="greeting" id="greeting">
            <!-- Greeting component will be rendered here -->
        </header>
        
        <section class="timer" id="timer">
            <!-- Timer component will be rendered here -->
        </section>
        
        <section class="tasks" id="tasks">
            <!-- Task component will be rendered here -->
        </section>
        
        <section class="quicklinks" id="quicklinks">
            <!-- QuickLinks component will be rendered here -->
        </section>
    </div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
